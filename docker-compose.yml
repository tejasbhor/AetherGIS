services:
  caddy:
    image: caddy:2-alpine
    container_name: aethergis-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - aethergis_caddy_data:/data
      - aethergis_caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - aethergis_net
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 150M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api/v1}
    container_name: aethergis-frontend
    restart: unless-stopped
    networks:
      - aethergis_net
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 100M

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aethergis-backend
    restart: unless-stopped
    env_file: .env
    environment:
      ENVIRONMENT: production
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-aetherredispass}@redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD:-aetherredispass}@redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD:-aetherredispass}@redis:6379/1}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://aethergis:aethergis@postgres:5432/aethergis}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - aethergis_runs:/app/backend/data/runs
      - aethergis_exports:/app/backend/data/exports
      - aethergis_cache:/app/backend/data/cache
      - aethergis_logs:/app/backend/data/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - aethergis_net
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1000M

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: aethergis-worker
    restart: unless-stopped
    command: >
      uv run celery -A backend.app.tasks.celery_app.celery_app worker
      --loglevel=info
      --concurrency=1
      -P solo
    env_file: .env
    environment:
      ENVIRONMENT: production
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-aetherredispass}@redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD:-aetherredispass}@redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD:-aetherredispass}@redis:6379/1}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://aethergis:aethergis@postgres:5432/aethergis}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - aethergis_runs:/app/backend/data/runs
      - aethergis_exports:/app/backend/data/exports
      - aethergis_cache:/app/backend/data/cache
      - aethergis_logs:/app/backend/data/logs
    networks:
      - aethergis_net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4000M

  postgres:
    image: imresamu/postgis:16-3.4-alpine
    container_name: aethergis-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aethergis}
      POSTGRES_USER: ${POSTGRES_USER:-aethergis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aethergis}
    volumes:
      - aethergis_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aethergis} -d ${POSTGRES_DB:-aethergis}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aethergis_net
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 500M

  redis:
    image: redis:7-alpine
    container_name: aethergis-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-aetherredispass}
    volumes:
      - aethergis_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-aetherredispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aethergis_net
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 200M

networks:
  aethergis_net:
    driver: bridge

volumes:
  aethergis_db_data:
  aethergis_redis_data:
  aethergis_runs:
  aethergis_exports:
  aethergis_cache:
  aethergis_logs:
  aethergis_caddy_data:
  aethergis_caddy_config:
